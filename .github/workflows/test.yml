name: Test Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '22'
  PNPM_CACHE_FOLDER: .pnpm-store

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ESLint
        run: pnpm lint
        continue-on-error: false

      - name: TypeScript check
        run: pnpm typecheck
        continue-on-error: false

  unit-and-integration:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Vitest with coverage
        run: pnpm test:coverage
        continue-on-error: false

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

  e2e:
    name: E2E Tests (Shard ${{ matrix.shardIndex }}/4)
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2, 3, 4]
        shardTotal: [4]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Start Strapi backend
        run: |
          cd backend
          npm run develop &
          echo "Waiting for Strapi to start..."
          for i in {1..60}; do
            curl -s http://localhost:1337/api/products > /dev/null 2>&1 && echo "Strapi ready" && break
            sleep 2
          done
        continue-on-error: false

      - name: Run seed
        run: cd backend && npm run seed
        env:
          STRAPI_API_TOKEN: ${{ secrets.STRAPI_API_TOKEN }}

      - name: Run E2E tests (shard ${{ matrix.shardIndex }}/${{ matrix.shardTotal }})
        run: pnpm exec playwright test --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
        env:
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          E2E_CLERK_USER_EMAIL: ${{ secrets.E2E_CLERK_USER_EMAIL }}
          E2E_CLERK_USER_PASSWORD: ${{ secrets.E2E_CLERK_USER_PASSWORD }}
          STRAPI_API_TOKEN: ${{ secrets.STRAPI_API_TOKEN }}
          NEXT_PUBLIC_STRAPI_API_URL: ${{ secrets.NEXT_PUBLIC_STRAPI_API_URL }}

      - name: Upload E2E report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-shard-${{ matrix.shardIndex }}
          path: playwright-report/
          retention-days: 30

      - name: Upload E2E traces
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-traces-shard-${{ matrix.shardIndex }}
          path: test-results/
          retention-days: 7

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [unit-and-integration, e2e]
    if: always()
    steps:
      - name: Report status
        run: |
          unit_result="${{ needs.unit-and-integration.result }}"
          e2e_result="${{ needs.e2e.result }}"
          echo "=== Test Suite Complete ==="
          echo "Unit & Integration: $unit_result"
          echo "E2E: $e2e_result"
          if [ "$unit_result" = "success" ] && [ "$e2e_result" = "success" ]; then
            echo "All tests passed."
          else
            echo "Some tests failed. Check artifacts for details."
            exit 1
          fi

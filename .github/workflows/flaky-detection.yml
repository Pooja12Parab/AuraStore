name: Flaky Test Detection

on:
  schedule:
    # Run at 6 AM on weekdays (Mon-Fri)
    - cron: '0 6 * * 1-5'

  # Allow manual trigger
  workflow_dispatch:

jobs:
  flaky-detection:
    name: Detect Flaky Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Start Strapi backend
        run: |
          cd backend
          npm run develop &
          for i in {1..60}; do
            curl -s http://localhost:1337/api/products > /dev/null 2>&1 && echo "Strapi ready" && break
            sleep 2
          done

      - name: Run E2E tests (attempt 1)
        run: pnpm exec playwright test --reporter=json --output=flaky-report-1.json || true
        env:
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          E2E_CLERK_USER_EMAIL: ${{ secrets.E2E_CLERK_USER_EMAIL }}
          E2E_CLERK_USER_PASSWORD: ${{ secrets.E2E_CLERK_USER_PASSWORD }}
          STRAPI_API_TOKEN: ${{ secrets.STRAPI_API_TOKEN }}
          NEXT_PUBLIC_STRAPI_API_URL: ${{ secrets.NEXT_PUBLIC_STRAPI_API_URL }}

      - name: Run E2E tests (attempt 2)
        run: pnpm exec playwright test --reporter=json --output=flaky-report-2.json || true
        env:
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          E2E_CLERK_USER_EMAIL: ${{ secrets.E2E_CLERK_USER_EMAIL }}
          E2E_CLERK_USER_PASSWORD: ${{ secrets.E2E_CLERK_USER_PASSWORD }}
          STRAPI_API_TOKEN: ${{ secrets.STRAPI_API_TOKEN }}
          NEXT_PUBLIC_STRAPI_API_URL: ${{ secrets.NEXT_PUBLIC_STRAPI_API_URL }}

      - name: Run E2E tests (attempt 3)
        run: pnpm exec playwright test --reporter=json --output=flaky-report-3.json || true
        env:
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          E2E_CLERK_USER_EMAIL: ${{ secrets.E2E_CLERK_USER_EMAIL }}
          E2E_CLERK_USER_PASSWORD: ${{ secrets.E2E_CLERK_USER_PASSWORD }}
          STRAPI_API_TOKEN: ${{ secrets.STRAPI_API_TOKEN }}
          NEXT_PUBLIC_STRAPI_API_URL: ${{ secrets.NEXT_PUBLIC_STRAPI_API_URL }}

      - name: Analyze flaky tests
        run: node scripts/analyze-flaky.js flaky-report-1.json flaky-report-2.json flaky-report-3.json

      - name: Zip flaky reports
        run: |
          zip -r flaky-reports.zip flaky-report-1.json flaky-report-2.json flaky-report-3.json || echo "No reports to zip"

      - name: Upload flaky reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: flaky-reports
          path: flaky-reports.zip
          retention-days: 7
